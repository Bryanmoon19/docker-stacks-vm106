services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - ${PROWLARR_PORT}:9696
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${SONARR_PORT}:8989
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/sonarr-anime:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${SONARR_ANIME_PORT}:8989
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${RADARR_PORT}:7878
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  radarr-4k:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr-4k
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/radarr-4k:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${RADARR_4K_PORT}:7878
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${BAZARR_PORT}:6767
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/lidarr:/config
      - ${MEDIA_PATH}:/data
    ports:
      - ${LIDARR_PORT}:8686
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/nzbget:/config
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      - ${NZBGET_PORT}:6789
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6789"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=${GLUETUN_VPN_PROVIDER}
      - VPN_TYPE=${GLUETUN_VPN_TYPE}
      - SERVER_REGIONS=${GLUETUN_SERVER_REGIONS}
      - OPENVPN_USER=${GLUETUN_OPENVPN_USER}
      - OPENVPN_PASSWORD=${GLUETUN_OPENVPN_PASSWORD}
    ports:
      - ${QBITTORRENT_PORT}:8080
      - 8888:8888
      - 8388:8388
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "1.1.1.1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    user: "977:988"
    network_mode: "service:gluetun"
    environment:
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - DOCKER_MODS=linuxserver/mods:universal-cron
    volumes:
      - ${QBIT_CONFIG_PATH}:/config
      - /mnt/media/downloads:/downloads
      - /mnt/media:/data
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
      - UN_DEBUG=false
      - UN_LOG_FILE=
      - UN_LOG_LEVEL=info
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_SONARR_1_URL=http://sonarr-anime:8990
      - UN_SONARR_1_API_KEY=${SONARR_ANIME_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_RADARR_1_URL=http://radarr-4k:7879
      - UN_RADARR_1_API_KEY=${RADARR_4K_API_KEY}
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
    volumes:
      - ${CONFIG_PATH}/unpackerr:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${MEDIA_PATH}:/data
    ports:
      - ${UNPACKERR_PORT}:5656
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5656/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    user: "977:988"
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/overseerr:/app/config
    ports:
      - ${OVERSEERR_PORT}:5055
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - ${FLARESOLVERR_PORT}:8191
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_PATH}/portainer:/data
    ports:
      - ${PORTAINER_PORT}:9000
      - ${PORTAINER_EDGE_PORT}:8000
    networks:
      - arr-network
    restart: unless-stopped
   # healthcheck:
     # test: ["CMD", "curl", "-f", "http://localhost:9000"]
     # interval: 30s
     # timeout: 10s
     # retries: 3
     # start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    user: "977:988"
    environment:
      - TZ=${TZ}
      - UMASK=${UMASK}
      - PORT=${CLEANUPARR_PORT}
    volumes:
      - ${CONFIG_PATH}/cleanuparr:/config
    ports:
      - ${CLEANUPARR_PORT}:11011
    networks:
      - arr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  arr-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}
